<svg width="1440" height="1200" viewBox="0 0 1440 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #F3F4F6; }
      .card { fill: #FFFFFF; stroke: #E5E7EB; rx: 24; }
      .sidebar { fill: #FFFFFF; stroke: #E5E7EB; rx: 24; }
      .muted { fill: #6B7280; font-family: Inter, Arial, sans-serif; font-size: 12px; }
      .title { fill: #111827; font-family: Inter, Arial, sans-serif; font-weight: 700; font-size: 20px; }
      .badge { fill: #8B5CF6; fill-opacity:1; }
      .badgeText { fill: #FFFFFF; font-family: Inter, Arial, sans-serif; font-weight:700; font-size:10px; }
    </style>
  </defs>
  <rect width="1440" height="1200" class="bg" />

  <!-- Sidebar -->
  <g transform="translate(24,24)">
    <rect x="0" y="0" width="280" height="1152" rx="24" class="sidebar" />
    <text x="20" y="40" class="title">Logo</text>
    <g transform="translate(16,80)" class="muted">
      <rect x="0" y="0" width="248" height="40" rx="10" fill="#F8FAFC" stroke="#E5E7EB" />
      <text x="16" y="26">Dashboard</text>
      <rect x="0" y="56" width="248" height="40" rx="10" fill="#F8FAFC" stroke="#E5E7EB" />
      <text x="16" y="82">Komitmen</text>
      <rect x="0" y="112" width="248" height="40" rx="10" fill="#F8FAFC" stroke="#E5E7EB" />
      <text x="16" y="138">Risiko</text>
      <rect x="0" y="168" width="248" height="40" rx="10" fill="#F8FAFC" stroke="#E5E7EB" />
      <text x="16" y="194">Profil</text>
      <rect x="0" y="224" width="248" height="40" rx="10" fill="#F8FAFC" stroke="#E5E7EB" />
      <text x="16" y="250">Verifikator</text>
    </g>
  </g>

  <!-- Content -->
  <g transform="translate(324,24)">
    <!-- Navbar -->
    <rect x="0" y="0" width="1092" height="72" rx="24" fill="#FFFFFF" stroke="#E5E7EB" />
    <text x="20" y="44" class="title">Profil Risiko Reputasi</text>
    <rect x="1032" y="16" width="40" height="40" rx="20" fill="#C7D2FE" />

    <!-- Header Card -->
    <rect x="0" y="96" width="1092" height="172" rx="24" fill="#FFFFFF" stroke="#E5E7EB" />
    <text x="24" y="132" class="title">Profil Risiko Reputasi</text>

    <!-- Detail box -->
    <rect x="24" y="152" width="1044" height="88" rx="16" fill="#F9FAFB" />
    <text x="40" y="182" class="muted">Nama Pemilik</text>
    <text x="40" y="202" class="title">-</text>
    <text x="540" y="182" class="muted">Nama Pengelola</text>
    <text x="540" y="202" class="title">-</text>

    <!-- Action bar -->
    <rect x="24" y="272" width="240" height="40" rx="12" fill="#FFFFFF" stroke="#D1D5DB" />
    <rect x="276" y="272" width="120" height="40" rx="12" fill="#7C3AED" />
    <text x="300" y="298" fill="#FFFFFF" font-weight="700">+ Tambah</text>
    <rect x="408" y="272" width="220" height="40" rx="12" fill="#16A34A" />
    <text x="432" y="298" fill="#FFFFFF" font-weight="700">Export Excel</text>

    <!-- Table container -->
    <rect x="0" y="332" width="1092" height="780" rx="24" fill="#FFFFFF" stroke="#D1D5DB" />

    <!-- Table header (simplified) -->
    <rect x="0" y="332" width="1092" height="48" fill="#5B21B6" rx="0" />
    <text x="12" y="360" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-weight="700">No</text>
    <text x="64" y="360" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-weight="700">Kode Risiko</text>
    <text x="200" y="360" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-weight="700">Tujuan</text>
    <text x="420" y="360" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-weight="700">Pernyataan Risiko</text>
    <text x="760" y="360" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-weight="700">Kategori</text>
    <text x="860" y="360" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-weight="700">Penyebab</text>

    <!-- sample rows -->
    <g transform="translate(0,384)">
      <rect x="0" y="0" width="1092" height="40" fill="#FFFFFF" />
      <text x="12" y="26">1</text>
      <text x="64" y="26">R-001</text>
      <text x="200" y="26">-</text>
      <text x="420" y="26">-</text>
      <!-- badge -->
      <rect x="760" y="6" width="80" height="28" rx="14" fill="#8B5CF6" />
      <text x="784" y="26" class="badgeText">Reputasi</text>
    </g>

    <g transform="translate(0,432)">
      <rect x="0" y="0" width="1092" height="40" fill="#F8FAFC" />
      <text x="12" y="26">2</text>
      <text x="64" y="26">R-002</text>
      <text x="200" y="26">-</text>
      <text x="420" y="26">-</text>
      <rect x="760" y="6" width="80" height="28" rx="14" fill="#8B5CF6" />
      <text x="784" y="26" class="badgeText">Reputasi</text>
    </g>

  </g>
</svg>
